services:
  qdrant:
    image: qdrant/qdrant:v1.17.1-unprivileged
    container_name: semantic_nav_qdrant
    restart: "no"
    environment:
      QDRANT__TELEMETRY_DISABLED: "true"
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    cpus: 1.0
    mem_limit: 1g
    security_opt:
      - no-new-privileges:true
